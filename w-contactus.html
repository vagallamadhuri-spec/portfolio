```html
<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<link rel="stylesheet" href="flowerdesign.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

<nav class="nav-bar">

<div class="logo">BloomNest</div>

<ul class="menu">
<li><a href="Index..html">Home</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="w-contactus.html">🛒 Cart</a></li>
</ul>

</nav>



<section class="contact-section">


<!-- CART -->

<fieldset id="cart-items" class="contact-box">
<legend>Your Cart</legend>
</fieldset>



<!-- DELIVERY FORM -->

<form onsubmit="placeOrder(event)">

<fieldset class="contact-box">

<legend>Flower Delivery</legend>


<label>Your Name:</label>
<input type="text" required>


<label>Delivery Address:</label>
<textarea rows="3" required></textarea>


<label>Phone Number:</label>
<input type="tel" required>


<label>Email:</label>
<input type="email" required>


<input type="submit" value="Place Order">
<input type="reset" value="Reset">

</fieldset>

</form>


</section>



<script>

/* LOAD CART */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

displayCart();



/* DISPLAY CART */

function displayCart(){

let container = document.getElementById("cart-items");

let total = 0;

let html = "<legend>Your Cart</legend>";

cart.forEach((item,index)=>{

let itemTotal = item.price * item.quantity;

total += itemTotal;

html += `

<p>

<b>${item.flower}</b><br>

Quantity: ${item.quantity}<br>

Price: ₹${item.price}<br>

Total: ₹${itemTotal}<br>

<button onclick="removeItem(${index})">
Remove
</button>

</p>

<hr>

`;

});


html += `<h3>Total Amount: ₹${total}</h3>`;

container.innerHTML = html;

}



/* REMOVE ITEM */

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

displayCart();

}



/* PLACE ORDER */

function placeOrder(event){

event.preventDefault();


if(cart.length === 0){

alert("Your cart is empty!");

return;

}


alert("Order placed successfully! 🌸");


/* clear cart */

localStorage.removeItem("cart");

cart = [];


/* reset form */

document.querySelector("form").reset();


/* reset cart box */

document.getElementById("cart-items").innerHTML =

"<legend>Your Cart</legend><p>Your cart is empty</p>";

}

</script>


</body>
</html>
```
