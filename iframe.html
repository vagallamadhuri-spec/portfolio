<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iframe Example</title>

<style>

body{
    background: linear-gradient(to right,#032b53,#02505f);
    text-align: center;
    font-family: Verdana, sans-serif;
}

h1{
    color:#e30bc2;
    margin-top:30px;
}

p{
    color:#f107de;
    margin-bottom:30px;
}

/* iframe style */
iframe{
    display:block;
    margin:25px auto;
    border-radius:10px;
    border:3px solid #3498db;
}

</style>

</head>

<body>
 
<h1>Iframe Demonstration</h1>
<p>The content below is loaded using an iframe:</p>

<iframe 
src="https://www.wikipedia.org"
width="600"
height="400">
</iframe>

<iframe 
src="https://www.youtube.com/embed/foRmO89E_iw"
width="600"
height="400">
</iframe>

<iframe 
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3664.5064934338875!2d78.33741946047324!3d17.348816603846984!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb959fed6ff1c3%3A0x946900c8908f5fbf!2s88XR%2B76R%20Kl%20Universiy%20Hyderabad%2C%20Aziznagar%2C%20Telangana%20500075!5e1!3m2!1sen!2sin!4v1770443646122!5m2!1sen!2sin"
width="600"
height="400">
</iframe>

</body>
</html>
